# AI ATC Companion — main configuration
# See .env.example for required environment variables

# X-Plane 12 data reception (Settings → Network → Data Output)
# Must be a port NOT used by X-Plane itself (avoid 49000/49001).
udp:
  port: 49100

audio:
  ptt_key: "f12" # pynput Key name (e.g. space, ctrl) or single char (e.g. v)
  input_device: null # null = system default; or device name substring
  output_device: null
  whisper_model_size: "large-v3" # tiny / base / small / medium / large-v3
  sample_rate: 16000 # Hz — faster-whisper expects 16 kHz
  channels: 1

controller:
  mode: "real" # "mock" or "real" — set to "real" to enable the Claude-powered Clearance Delivery controller
  icao: "LIML" # departure airport ICAO code
  runway: "36" # active departure runway

pilot:
  callsign: "RYR2NM" # ICAO format (e.g. RYR2NM); prefix used to look up spoken company name
  company: "" # spoken company name override (e.g. RYANAIR); leave blank to use built-in lookup

fms:
  path: null # absolute path to .fms file exported from X-Plane 12; null = no flight plan loaded

xplane:
  path: null # X-Plane 12 root folder; used to locate CIFP at Resources/default data/CIFP/

# AI ATC Companion — main configuration
# See .env.example for required environment variables

# X-Plane 12 data reception (Settings → Network → Data Output)
# Must be a port NOT used by X-Plane itself (avoid 49000/49001).
udp:
  port: 49100

audio:
  ptt_key: "ctrl+space" # single key (e.g. space) or combo (e.g. ctrl+space, alt+v)
  proactive_enabled: true # set to false to disable unsolicited ATC transmissions
  input_device: null # null = system default; or device name substring
  output_device: null
  whisper_model_size: "large-v3" # tiny / base / small / medium / large-v3
  sample_rate: 16000 # Hz — faster-whisper expects 16 kHz
  channels: 1

controller:
  mode: "real" # "mock" or "real"

pilot:
  callsign: "RYR2NM" # ICAO format (e.g. RYR2NM); prefix used to look up spoken company name
  company: "Ryanair" # spoken company name override (e.g. RYANAIR); leave blank to use built-in lookup
  parking_stand: "" # stand/gate number (e.g. "05"); used by Ground for realistic taxi routing

fms:
  path: C:\Users\fabry\Documents\Claude\ai-atc-companion\LIMLLIRF01.fms # absolute path to .fms file exported from X-Plane 12; null = no flight plan loaded

xplane:
  root: C:\Program Files (x86)\Steam\steamapps\common\X-Plane 12 # X-Plane 12 root folder; used to locate apt.dat
  path: C:\Program Files (x86)\Steam\steamapps\common\X-Plane 12\Custom Data\CIFP # CIFP directory; used by cifp_parser
